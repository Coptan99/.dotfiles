<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
    <alias>
        <family>sans-serif</family>
        <prefer>
            <family>Noto Naskh Arabic</family>
            <family>Joy Pixels</family>
        </prefer>
    </alias>
    <alias>
        <family>serif</family>
        <prefer>
            <family>Noto Naskh Arabic</family>
            <family>Joy Pixels</family>
        </prefer>
    </alias>
    <alias>
		<family>sans</family>
		<prefer>
            <family>Noto Naskh Arabic</family>
			<family>Joy Pixels</family>
		</prefer>
	</alias>
    <alias>
        <family>monospace</family>
        <prefer>
            <family>JetBrainsMonoNL Nerd Font</family>
        </prefer>
    </alias>
</fontconfig>
