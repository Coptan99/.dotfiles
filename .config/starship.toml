#format = """
#[вХ≠вФАuserвФАвФАвФАвЭѓ](bold blue) $username
#[вФ£вФАsystemвФАвЭѓ](bold yellow) $hostname
#[вФ£вФАprojectвЭѓ](bold red) $directory$rust$git_branch$git_state$git_status$package$golang$terraform$docker_context$python$docker_context$nodejs
#[вХ∞вФАcmdвФАвФАвФАвФАвЭѓ](bold green)
#"""
[username]
style_user = "green bold"
style_root = "red bold"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = 'on [$hostname](bold purple) '
trim_at = "."
disabled = false

# Replace the "вЭѓ" symbol in the prompt with "вЮЬ"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[вЮЬ](bold green)"     # The "success_symbol" segment is being set to "вЮЬ" with the color "bold green"
error_symbol = "[вЬЧ](bold red)"

# пФґ пФі
# configure directory
[directory]
read_only = " п†љ"
truncation_length = 10
truncate_to_repo = true # truncates directory to root folder if in github repo
style = "bold italic blue"

[cmd_duration]
min_time = 4
show_milliseconds = false
disabled = false
style = "bold italic red"

[aws]
symbol = "оМљ  "

[conda]
symbol = "пДМ "

[dart]
symbol = "оЮШ "

#[directory]
#read_only = " п†љ"

[docker_context]
symbol = "пМИ "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[elixir]
symbol = "оЙµ "

[elm]
symbol = "оШђ "

[git_branch]
symbol = "пРШ "

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
stashed = "[${count}*](green)"
modified = "[${count}+](yellow)"
deleted =  "[${count}-](red)"
conflicted =  "[${count}~](red)"
ahead = "вЗ°${count}"
behind = "вЗ£${count}"
untracked = "[${count}?](blue)"
staged = "[${count}+](green)"

[git_state]
style =	"bold red"
format = "[$state( $progress_current/$progress_total) ]($style)"
rebase = "rebase"
merge = "merge"
revert = "revert"
cherry_pick = "cherry"
bisect = "bisect"
am = "am"
am_or_rebase = "am/rebase"

[golang]
symbol = "оШІ "

[hg_branch]
symbol = "пРШ "

[java]
symbol = "оЙЦ "

[julia]
symbol = "оШ§ "

[haskell]
symbol = "ќї "

[memory_usage]
symbol = "п°Ъ "

[nim]
symbol = "пЪ§ "

[nix_shell]
symbol = "пЛЬ "

[package]
symbol = "п£Ц "

[perl]
symbol = "оЭ© "

[php]
